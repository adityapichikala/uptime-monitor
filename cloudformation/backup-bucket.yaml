AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 backup bucket for AI API Observatory — stores providers.json
  backups with versioning enabled.

Parameters:
  BucketSuffix:
    Type: String
    Description: "AWS Account ID or unique suffix for bucket name"

Resources:
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "uptime-backup-${BucketSuffix}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: ai-observatory
        - Key: Environment
          Value: student

Outputs:
  BucketName:
    Description: Backup bucket name
    Value: !Ref BackupBucket
  BucketArn:
    Description: Backup bucket ARN
    Value: !GetAtt BackupBucket.Arn
